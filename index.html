<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>子機パネル</title>

<style>
body {
  background-color: black;
  color: white;
  margin: 0;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  font-size: 40px;
}
</style>

</head>
<body>

<div class="container">
  <div class="time" id="time"></div>
  <div class="info" id="info">待機中</div>
</div>

  <script>

const firebaseConfig = {
    apiKey: "AIzaSyAG45X-OXQzr_doNzlXNzdqKZ5oJwiNHnc",
    authDomain: "kaigo-pane1.firebaseapp.com",
    databaseURL: "https://kaigo-pane1-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "kaigo-pane1",
    storageBucket: "kaigo-pane1.firebasestorage.app",
    messagingSenderId: "500881477374",
    appId: "1:500881477374:web:2efa2cf7a5d58030bcdfaf"
  };

firebase.initializeApp(firebaseConfig);
const database = firebase.database();

// 🕒 時計
function updateTime(){
  const now = new Date();
  const h = String(now.getHours()).padStart(2,'0');
  const m = String(now.getMinutes()).padStart(2,'0');
  document.getElementById("time").innerText = h + ":" + m;
}
setInterval(updateTime,1000);
updateTime();

// 🌙 nightMode監視
database.ref("settings/nightMode").on("value", function(snapshot){
  const nightMode = snapshot.val();

  if(nightMode === true){
    document.body.classList.add("black");
    document.querySelector(".container").style.display="none";
  }else{
    document.body.classList.remove("black");
    document.querySelector(".container").style.display="block";
  }
});

  </script>

</body>
</html>
